<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AR Корпус УдГУ</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script src="js/building.js"></script>
</head>

<body>

    <a-scene embedded vr-mode-ui="enabled: false" renderer="logarithmicDepthBuffer: true;"
        arjs="sourceType: webcam; debugUIEnabled: false;">

        <a-assets>
            <a-asset-item id="buildingModel" src="assets/models/udsu-building.glb">
            </a-asset-item>
        </a-assets>

        <a-marker type="pattern" url="assets/markers/pattern-udsu2.patt">

            <a-entity gltf-model="#buildingModel" position="0 0 0" scale="1 1 1">
            </a-entity>

        </a-marker>

        <a-entity camera></a-entity>

    </a-scene>

    <script src="js/app.js"></script>

</body>

</html>
